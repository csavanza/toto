<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVANZATOTO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('background.jpg') center center/cover no-repeat;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        135deg,
        rgba(0,0,0,.75),
        rgba(0,0,0,.55)
    );
    backdrop-filter:blur(4px);
}

#particles{
    position:absolute;
    inset:0;
    z-index:15;
    overflow:hidden;
    pointer-events:none;
    border-radius:30px;
}

.container{
    position:relative;
    z-index:10;
    width:min(90%,650px);
    overflow:hidden;
    padding:40px;
    border-radius:30px;
    text-align:center;
    background:rgba(0,0,0,.18);
    backdrop-filter:blur(5px);
    border:1px solid rgba(255,255,255,.12);
    box-shadow:
    0 0 40px rgba(255,215,0,.10),
    0 0 80px rgba(255,140,0,.08);
}

.logo{
    font-size:clamp(32px,9vw,60px);
    font-weight:900;
    color:#ffd700;
    text-shadow:
    0 0 10px #ffd700,
    0 0 20px #ffae00,
    0 0 40px #ff7b00;
    line-height:1.1;
    letter-spacing:2px;
    margin-bottom:15px;
}

.subtitle{
    color:#e5e5e5;
    font-size:15px;
    line-height:1.5;
    margin-bottom:30px;
}

.info{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:18px;
    margin-bottom:30px;
    color:#fff;
    font-size:14px;
    line-height:1.8;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:18px;
    border-radius:16px;
    font-size:20px;
    font-weight:700;
    text-decoration:none;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:
    0 0 20px rgba(255,215,0,.35),
    0 0 40px rgba(255,215,0,.20);
}

.login{
    background:linear-gradient(135deg,#ff9800,#ff5722);
    color:#fff;
}

.daftar{
    background:linear-gradient(135deg,#00c853,#00e676);
    color:#fff;
}

.promosi{
    background:linear-gradient(135deg,#ffd600,#ffab00);
    color:#111;
}

/* TAMBAHAN MENU BARU */
.hubungi{
    background:linear-gradient(135deg,#2196f3,#00bcd4);
    color:#fff;
}

.footer{
    margin-top:25px;
    color:#ccc;
    font-size:12px;
}

/* BULIR EMAS */
.gold-particle{
    position:absolute;
    top:-20px;
    border-radius:50%;
    pointer-events:none;

    background:radial-gradient(
        circle,
        #fff,
        #ffe082,
        #ffca28,
        #ff9800
    );

    box-shadow:
    0 0 8px #ffd700,
    0 0 20px #ffca28,
    0 0 35px rgba(255,215,0,.9);

    animation:goldFall linear forwards;
}

@keyframes goldFall{
    0%{transform:translateY(-20px);opacity:0;}
    10%{opacity:1;}
    100%{transform:translateY(110vh) translateX(60px);opacity:0;}
}

@media(max-width:480px){
    .container{width:92%;padding:25px 20px;}
    .logo{font-size:clamp(28px,10vw,42px);}
    .subtitle{font-size:13px;}
    .info{font-size:13px;padding:14px;}
    .btn{padding:16px;font-size:17px;}
    .footer{font-size:11px;}
}

/* ===== ROCKET PRO EFFECT ===== */

.rocket-launch{
    position:fixed;
    left:50%;
    bottom:-250px;
    width:70px;
    height:180px;
    transform:translateX(-50%);
    z-index:999999;
    pointer-events:none;
    animation:rocketFly 1.6s ease-in forwards;
}

.rocket-body{
    position:absolute;
    width:70px;
    height:120px;
    background:linear-gradient(
        to bottom,
        #ffffff,
        #dcdcdc,
        #bfbfbf
    );
    border-radius:40px 40px 15px 15px;
    box-shadow:
    0 0 20px rgba(255,255,255,.8),
    0 0 50px rgba(255,215,0,.4);
}

.rocket-window{
    position:absolute;
    top:25px;
    left:50%;
    transform:translateX(-50%);
    width:22px;
    height:22px;
    border-radius:50%;
    background:#4fc3f7;
    border:3px solid #fff;
}

.rocket-fire{
    position:absolute;
    bottom:-75px;
    left:50%;
    transform:translateX(-50%);
    width:26px;
    height:90px;
    border-radius:50%;
    background:linear-gradient(
        to bottom,
        #ffffff,
        #ffd54f,
        #ff9800,
        #ff5722,
        transparent
    );
    filter:blur(8px);
    animation:fireMove .08s infinite alternate;
}

@keyframes fireMove{
    from{
        height:80px;
    }
    to{
        height:110px;
    }
}

@keyframes rocketFly{
    0%{
        bottom:-250px;
    }

    15%{
        bottom:50px;
    }

    100%{
        bottom:130%;
    }
}

.flash-launch{
    position:fixed;
    inset:0;
    background:radial-gradient(
        circle,
        rgba(255,215,0,.8),
        rgba(255,140,0,.4),
        transparent 70%
    );
    opacity:0;
    pointer-events:none;
    z-index:999998;
    animation:flashEffect 1.6s forwards;
}

@keyframes flashEffect{
    0%{opacity:0;}
    15%{opacity:1;}
    100%{opacity:0;}
}

body.launching{
    animation:
    shakeLaunch .12s infinite,
    zoomLaunch 1.6s forwards;
}

@keyframes shakeLaunch{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(2px,2px);}
    100%{transform:translate(0,0);}
}

@keyframes zoomLaunch{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.12);
    }
}
</style>
</head>

<body>

<div class="container">
    
<div id="particles"></div>

    <div class="logo">AVANZATOTO</div>

    <div class="subtitle">
        Situs Game Online Resmi Terbaik Dan Terpercaya
    </div>

    <div class="info">
        ✨ Tampilan Premium<br>
        ⚡ Akses Cepat & Responsif<br>
        📱 Optimal untuk Mobile & Desktop
    </div>

    <div class="menu">

        <a class="btn login"
           href="#"
           onclick="launchRocket('https://vxn5gdwdjc.avanza189.com/login');return false;">
           LOGIN
        </a>

        <a class="btn daftar"
           href="#"
           onclick="launchRocket('https://vxn5gdwdjc.avanza189.com/register');return false;">
            DAFTAR
        </a>

        <a class="btn promosi"
           href="#"
           onclick="launchRocket('https://vxn5gdwdjc.avanza189.com/promotion'); return false;">
           PROMOSI & BONUS
        </a>

        <a class="btn hubungi"
           href="#"
           onclick="launchRocket('https://vxn5gdwdjc.avanza189.com/support'); return false;">
           HUBUNGI KAMI
        </a>

    </div>

    <div class="footer">
        © 2026 AVANZATOTO
    </div>

</div>

<script>
function createGoldParticle(){
    const particle = document.createElement("div");
    particle.className = "gold-particle";

    const size = Math.random() * 8 + 2;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

const container = document.querySelector(".container");

particle.style.left =
Math.random() * container.offsetWidth + "px";
    particle.style.animationDuration = (Math.random() * 5 + 5) + "s";

    document.getElementById("particles").appendChild(particle);

    setTimeout(()=> particle.remove(),12000);
}

setInterval(createGoldParticle,120);
</script>

<script>

function launchRocket(url){

    document.body.classList.add("launching");

    const flash = document.createElement("div");
    flash.className = "flash-launch";
    document.body.appendChild(flash);

    const rocket = document.createElement("div");
    rocket.className = "rocket-launch";
   rocket.innerHTML = `
<div class="rocket-body">
<div class="rocket-window"></div>
</div>
<div class="rocket-fire"></div>
`;
    document.body.appendChild(rocket);

    setTimeout(()=>{
        window.location.href = url;
    },1500);

}

</script>

</body>
</html>
